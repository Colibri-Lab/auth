<div ComponentName="App.Modules.Auth.Components.LoginForm">

    <Pane name="form-container" shown="true">    
        <TextSpan shown="true" name="form-login-title" className="app-auth-form-component-title">#{auth-logincontainer-login-title}</TextSpan>
        <Forms.Form name="form" shown="true"></Forms.Form>
    </Pane>
    <Pane name="timer-container" shown="false">
        <TextSpan name="timer" shown="false" value="#{auth-login-timer-value}" />
        <Link name="request-code-again" shown="false" value="#{auth-login-requestagain}" />
    </Pane>
    <FlexBox name="links-container" shown="true">
        <Link name="reset" shown="true" value="#{auth-login-reset}"></Link>
    </FlexBox>
    <FlexBox name="button-container" shown="true" className="buttons-pane">            
        <SuccessButton name="login" shown="true" enabled="true" tabIndex="true" value="#{auth-login-button}"></SuccessButton>
        <SuccessButton name="fingerprint" shown="false" enabled="true" tabIndex="true" icon="Colibri.UI.FingerprintIcon" iconPosition="right"></SuccessButton>
    </FlexBox>
    <FlexBox shown="true" name="button-container2" className="buttons-pane -gap10">
        <TextSpan shown="true" value="#{auth-register-login-text}"></TextSpan>
        <Link name="register" shown="true" enabled="true" tabIndex="true" value="#{auth-login-register-button}"></Link>
    </FlexBox>

</div>
